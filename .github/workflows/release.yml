name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pack compendia
        run: npm run compendia:pack || echo "::warning::compendia:pack failed, using source packs"

      - name: Vite build
        run: npx vite build

      - name: Ensure packs in dist
        run: |
          if [ ! -d "dist/packs" ] || [ -z "$(ls -A dist/packs 2>/dev/null)" ]; then
            echo "Copying source packs to dist..."
            cp -r src/packs dist/packs
          fi

      - name: Inject version into system.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          cd dist
          jq --arg v "$VERSION" \
             --arg dl "https://github.com/tisken/animabeyondfantasy/releases/download/${TAG}/animabf.zip" \
             --arg cl "https://github.com/tisken/animabeyondfantasy/releases/tag/${TAG}" \
             '.version = $v | .download = $dl | .changelog = $cl' \
             system.json > system.tmp.json && mv system.tmp.json system.json

      - name: Package dist as zip
        run: cd dist && zip -r ../animabf.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            animabf.zip
            dist/system.json
